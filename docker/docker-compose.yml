version: '3.9'

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - ../:/app

    env_file:
      - ../.env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading_engine

    ports:
      - "5432:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"
